services:
  db:
    build: ./db
    container_name: db
    env_file:
      - ./db/.env
    ports:
      - "5432:5432"
    volumes:
      - "db_data:/var/lib/postgresql/data"
  backend:
    build: ./backend
    container_name: backend
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    container_name: frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  db_data:
